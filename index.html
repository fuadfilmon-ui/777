<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KING BINGO ROYAL - LIVE</title>
    <style>
        :root { --gold: #ffd700; --dark: #000000; --red: #ff3300; --green: #28a745; --blue: #0088ff; }
        body { font-family: 'Arial Black', sans-serif; background: #8b0000; color: white; margin: 0; text-align: center; }
        
        /* Layout container */
        .game-container { display: flex; flex-direction: row; justify-content: space-around; padding: 10px; background: #f4d03f; min-height: 95vh; margin: 5px; border-radius: 10px; border: 5px solid #5d4037; }

        /* Left Side: Live Ball and My Card */
        .left-panel { width: 45%; display: flex; flex-direction: column; align-items: center; }
        .ball-display { width: 100px; height: 100px; background: white; color: red; border-radius: 50%; line-height: 100px; font-size: 50px; font-weight: 900; border: 4px solid #333; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        
        .my-card-label { background: #0088ff; padding: 5px 15px; border-radius: 5px 5px 0 0; font-size: 14px; font-weight: bold; width: 80%; }
        .bingo-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; background: white; padding: 5px; border: 3px solid #0088ff; width: fit-content; }
        .cell { width: 35px; height: 35px; background: white; color: black; line-height: 35px; font-weight: 900; border: 1px solid #ccc; font-size: 16px; }
        .cell.marked { background: var(--green) !important; color: white !important; }
        .cell.free { background: #0088ff; color: white; font-size: 10px; }

        /* Right Side: Bingo Board (1-75) */
        .right-panel { width: 50%; background: #fffde7; border-radius: 10px; border: 2px solid #5d4037; padding: 5px; }
        .board-header { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 5px; }
        .board-header div { width: 18%; padding: 5px 0; border-radius: 3px; color: white; }
        .b { background: #00bcd4; } .i { background: #e91e63; } .n { background: #9e9e9e; } .g { background: #4caf50; } .o { background: #ff9800; }

        .numbers-board { display: grid; grid-template-columns: repeat(5, 1fr); gap: 3px; }
        .board-num { width: 30px; height: 30px; background: white; color: #333; border-radius: 50%; line-height: 30px; font-size: 12px; font-weight: bold; border: 1px solid #ddd; }
        .board-num.called { background: #9b59b6; color: white; border-color: #8e44ad; }

        /* Order / Instruction Section */
        .order-box { background: #b22222; color: white; padding: 10px; border-radius: 5px; margin-top: 10px; font-size: 12px; font-weight: bold; width: 90%; }
        .btn-bingo { background: #9e9e9e; color: white; border: none; padding: 10px 30px; border-radius: 5px; font-size: 20px; font-weight: bold; margin-top: 10px; cursor: pointer; }

        /* Selection Screen */
        .screen { display: none; padding: 15px; }
        .active { display: block; }
        .pool { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; max-height: 400px; overflow-y: auto; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px; }
        .c-btn { background: #444; color: white; border: 1px solid #777; padding: 15px; border-radius: 5px; font-weight: bold; }
        .c-btn.selected { background: var(--gold); color: black; }
    </style>
</head>
<body>

    <div id="scr-select" class="screen active">
        <h1 style="color:var(--gold)">KING BINGO ROYAL</h1>
        <p>ካርቴላ ይምረጡ (1-200)</p>
        <div class="pool" id="pool"></div>
        <button onclick="startGame()" style="background:orange; padding:20px; width:90%; border-radius:50px; font-size:22px; margin-top:20px; font-weight:bold;">JOIN GAME</button>
    </div>

    <div id="scr-game" class="screen">
        <div class="game-container">
            <div class="left-panel">
                <div class="ball-display" id="current-ball">-</div>
                <div class="my-card-label">My Card #<span id="card-id">0</span></div>
                <div class="bingo-grid" id="card-grid"></div>
                
                <div class="order-box">
                    የጨዋታ ትዕዛዝ:<br>
                    <span style="font-size:16px;">በ መስመር (HORIZONTAL)</span>
                </div>
                
                <button class="btn-bingo" onclick="checkBingo()">Bingo</button>
                <div style="color:red; font-size:12px; margin-top:5px;">0.00 Points</div>
            </div>

            <div class="right-panel">
                <div class="board-header">
                    <div class="b">B</div><div class="i">I</div><div class="n">N</div><div class="g">G</div><div class="o">O</div>
                </div>
                <div class="numbers-board" id="main-board"></div>
            </div>
        </div>
    </div>

    <script>
        let myNums = [];
        let calledNums = [];
        let selectedCard = null;

        // ካርቴላዎችን መፍጠር
        const poolDiv = document.getElementById('pool');
        for(let i=1; i<=200; i++) {
            let btn = document.createElement('button');
            btn.className = 'c-btn';
            btn.innerText = i;
            btn.onclick = () => {
                selectedCard = i;
                document.querySelectorAll('.c-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                generateCard();
            };
            poolDiv.appendChild(btn);
        }

        // 1-75 ሰሌዳ መፍጠር
        const board = document.getElementById('main-board');
        for(let i=1; i<=75; i++) {
            board.innerHTML += `<div class="board-num" id="board-${i}">${i}</div>`;
        }

        function generateCard() {
            myNums = [];
            const ranges = [[1,15], [16,30], [31,45], [46,60], [61,75]];
            ranges.forEach(r => {
                let col = [];
                while(col.length < 5) {
                    let n = Math.floor(Math.random()*(r[1]-r[0]+1)) + r[0];
                    if(!col.includes(n)) col.push(n);
                }
                myNums.push(...col);
            });
            myNums[12] = 'FREE';
        }

        function startGame() {
            if(!selectedCard) return alert("ካርቴላ ይምረጡ!");
            document.getElementById('scr-select').classList.remove('active');
            document.getElementById('scr-game').classList.add('active');
            document.getElementById('card-id').innerText = selectedCard;
            
            const grid = document.getElementById('card-grid');
            grid.innerHTML = '';
            myNums.forEach(n => {
                grid.innerHTML += `<div class="cell ${n==='FREE'?'free':''}" id="num-${n}">${n==='FREE'?'KING':n}</div>`;
            });

            runGame();
        }

        function runGame() {
            setInterval(() => {
                if(calledNums.length >= 75) return;
                let ball;
                do { ball = Math.floor(Math.random() * 75) + 1; } while(calledNums.includes(ball));
                calledNums.push(ball);

                document.getElementById('current-ball').innerText = ball;
                document.getElementById('board-' + ball).classList.add('called');
                
                let myCell = document.getElementById('num-' + ball);
                if(myCell) myCell.classList.add('marked');
            }, 4000);
        }

        function checkBingo() {
            alert("ቢንጎ ተፈትሾ አሸናፊ መሆንዎ ይረጋገጣል!");
            location.reload();
        }
    </script>
</body>
</html>
